<?xml version="1.0" encoding="utf-8" ?>
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="grad1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#004C99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001A33;stop-opacity:1" />
    </radialGradient>
    
    <!-- Ghost DTM Matrix (Subtle, near invisible to human eye) -->
    <pattern id="ghost_matrix" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="1" fill="white" opacity="0.05"/>
      <circle cx="2" cy="2" r="0.1" fill="white" opacity="0.03"/>
    </pattern>
  </defs>
  
  <rect width="100" height="100" fill="#F0F0F0" />
  
  <!-- The Master Seal - Clean Aesthetic -->
  <circle cx="50" cy="50" r="45" fill="url(#grad1)" stroke="#000" stroke-width="0.5" />
  
  <!-- Hidden AOA Layers (Stealth Mode) -->
  <circle cx="50" cy="50" r="45" fill="url(#ghost_matrix)" />
  <circle cx="50" cy="50" r="10" fill="none" stroke="white" stroke-width="0.2" opacity="0.1" />
  <circle cx="50" cy="50" r="20" fill="none" stroke="white" stroke-width="0.2" opacity="0.08" />
  <circle cx="50" cy="50" r="30" fill="none" stroke="white" stroke-width="0.2" opacity="0.05" />
  
  <!-- Central Sovereign Brand (The G Logo Placeholder) -->
  <path d="M45 40 L55 40 L55 50 L45 50 Z" fill="white" opacity="0.9" /> <!-- Placeholder for your 'G' Shield -->
  
  <!-- Dynamic ID (Very subtle, integrated into design) -->
  <text x="50" y="70" font-family="monospace" font-size="4" font-weight="bold" fill="white" text-anchor="middle" opacity="0.6">{{AOA_ID}}</text>
  
  <!-- Outer Circular Text (The Brand Identity) -->
  <path id="circlePath" d="M 50, 50 m -40, 0 a 40,40 0 1,1 80,0 a 40,40 0 1,1 -80,0" fill="none"/>
  <text font-family="sans-serif" font-size="3.5" fill="white" font-weight="bold">
    <textPath xlink:href="#circlePath" startOffset="25%" text-anchor="middle">
      VEÍCULO VERIFICADO • IDENTIDADE CONFIÁVEL
    </textPath>
  </text>
</svg>