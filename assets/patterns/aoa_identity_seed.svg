<?xml version="1.0" encoding="utf-8" ?>
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grain_pattern" width="2" height="2" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="0.5" height="0.5" fill="#0066CC" opacity="0.4"/>
      <rect x="1" y="1" width="0.5" height="0.5" fill="#0066CC" opacity="0.2"/>
    </pattern>
  </defs>
  
  <rect width="100" height="100" fill="#FFF" />
  
  <!-- Identity Seed Sphere -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#003366" stroke-width="0.2" stroke-dasharray="1,1" />
  
  <!-- Core Grain Pattern (Identity Entropy) -->
  <circle cx="50" cy="50" r="30" fill="url(#grain_pattern)" stroke="#0066CC" stroke-width="2" />
  
  <!-- Centered Data Bar -->
  <rect x="25" y="45" width="50" height="10" fill="white" stroke="#0066CC" stroke-width="0.5" />
  <text x="50" y="52" font-family="monospace" font-size="6" font-weight="bold" fill="#003366" text-anchor="middle">{{SEED_ID}}</text>
  
  <text x="50" y="15" font-family="sans-serif" font-size="3" font-weight="bold" fill="#003366" text-anchor="middle" letter-spacing="2">SYMBEON IDENTITY SEED</text>
  <text x="50" y="85" font-family="sans-serif" font-size="3" fill="#003366" text-anchor="middle" opacity="0.5" letter-spacing="3">AOA PROTOCOL v2.1</text>
</svg>