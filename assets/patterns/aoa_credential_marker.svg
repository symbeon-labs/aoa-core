<?xml version="1.0" encoding="utf-8" ?>
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Checkpoint Background -->
  <rect width="100" height="100" fill="#001a33" />
  
  <!-- High Contrast Outer Ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="white" stroke-width="4" />
  
  <!-- Credential Core -->
  <circle cx="50" cy="50" r="35" fill="white" />
  
  <!-- Concentric Rings (Inverted for maximum contrast) -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#001a33" stroke-width="2" />
  <circle cx="50" cy="50" r="20" fill="none" stroke="#001a33" stroke-width="1" />
  
  <!-- Status Text -->
  <text x="50" y="45" font-family="sans-serif" font-size="4" font-weight="bold" fill="#001a33" text-anchor="middle">CREDENTIAL</text>
  <text x="50" y="60" font-family="monospace" font-size="10" font-weight="bold" fill="#001a33" text-anchor="middle">AUTHORIZED</text>
  
  <!-- AOA Branding -->
  <text x="50" y="94" font-family="sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">AOA ACCESS NODE</text>
</svg>