<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
  .container { position: relative; width: 600px; height: 600px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
  h1 { color: #333; text-align: center; font-size: 18px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
  .seal-wrapper { width: 100%; height: 80%; display: flex; justify-content: center; }
  svg { width: 450px; height: 450px; }
</style>
</head>
<body>
<div class="container">
  <h1>AOA Core Protocol - Atomic Signature v2.2</h1>
  <div class="seal-wrapper">
    <!-- Inline SVG rendered for screenshot -->
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="grad1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
          <stop offset="0%" style="stop-color:#004C99;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#001A33;stop-opacity:1" />
        </radialGradient>
        <pattern id="dtm_matrix" width="4" height="4" patternUnits="userSpaceOnUse">
          <rect x="0" y="0" width="1" height="1" fill="white" opacity="0.4"/>
          <rect x="2" y="2" width="0.5" height="0.5" fill="white" opacity="0.2"/>
          <circle cx="1" cy="3" r="0.2" fill="white" opacity="0.5"/>
        </pattern>
      </defs>
      <rect width="100" height="100" fill="#F5F5F5" />
      <circle cx="50" cy="50" r="48" fill="none" stroke="#003366" stroke-width="0.3" stroke-dasharray="1,1" />
      <circle cx="50" cy="50" r="45" fill="url(#grad1)" stroke="#000" stroke-width="1" />
      <circle cx="50" cy="50" r="45" fill="url(#dtm_matrix)" />
      <circle cx="50" cy="50" r="10" fill="none" stroke="white" stroke-width="0.6" opacity="0.9" />
      <circle cx="50" cy="50" r="18" fill="none" stroke="white" stroke-width="1.2" opacity="0.7" />
      <circle cx="50" cy="50" r="28" fill="none" stroke="white" stroke-width="1.8" opacity="0.5" />
      <circle cx="50" cy="50" r="40" fill="none" stroke="white" stroke-width="2.2" opacity="0.3" />
      <rect x="30" y="46" width="40" height="8" rx="1" fill="#001A33" opacity="0.9" />
      <text x="50" y="52" font-family="monospace" font-size="6" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">GD-7A-42</text>
      <text x="50" y="88" font-family="sans-serif" font-size="4" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">AOA 2.2 ATOMIC SIGNATURE</text>
    </svg>
  </div>
</div>
</body>
</html>
